<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Shiny Landing Page</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #eaeaea;
    }

    /* ICON STYLE */
    i {
      margin-right: 8px;
      color: #0ff;
      text-shadow: 0 0 8px #0ff;
    }

    /* HEADER */
    header {
      background: rgba(13, 17, 23, 0.95);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 10px rgba(0,255,255,0.2);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
    }

    nav ul li a:hover {
      color: #0ff;
      text-shadow: 0 0 10px #0ff;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('https://picsum.photos/1920/1080?blur') center/cover no-repeat;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 3rem;
      color: #0ff;
      text-shadow: 0 0 20px #0ff;
    }

    .hero button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      background: #0ff;
      cursor: pointer;
      box-shadow: 0 0 15px #0ff;
    }

    .hero button:hover {
      transform: scale(1.1);
    }

    /* FEATURES */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 3rem;
      background: #161b22;
    }

    .feature {
      background: #1e242d;
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,255,255,0.2);
    }

    .feature:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 25px #0ff;
    }

    .feature h3 {
      color: #0ff;
      margin-bottom: 10px;
    }

    /* CONTACT */
    .contact {
      padding: 3rem;
      text-align: center;
    }

    .contact h2 {
      color: #0ff;
    }

    .contact-form {
      max-width: 600px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .contact-form input,
    .contact-form textarea {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #1e242d;
      color: white;
    }

    .contact-form button {
      padding: 10px;
      border-radius: 30px;
      border: none;
      background: #0ff;
      cursor: pointer;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 1rem;
      color: #aaa;
    }

    /* MOBILE */
    @media(max-width:768px){
      nav ul {
        display: none;
        flex-direction: column;
        position: absolute;
        right: 0;
        top: 60px;
        background: #1e242d;
        width: 200px;
      }

      nav ul.active {
        display: flex;
      }

      .menu-toggle {
        display: block;
        color: #0ff;
        cursor: pointer;
      }
    }

    @media(min-width:769px){
      .menu-toggle {
        display: none;
      }
    }
  </style>
</head>

<body>

<header>
  <nav>
    <h2><i class="fas fa-bolt"></i>MyBrand</h2>
    <span class="menu-toggle"><i class="fas fa-bars"></i></span>
    <ul>
      <li><a href="#hero">Home</a></li>
      <li><a href="#features">Features</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
</header>

<section id="hero" class="hero">
  <div class="hero-content">
    <h1>Landing Page</h1>
    <p>Start building something real.</p>
    <button onclick="document.querySelector('#features').scrollIntoView({behavior:'smooth'})">
      Explore
    </button>
  </div>
</section>

<section id="features" class="features">
  <div class="feature">
    <h3><i class="fas fa-rocket"></i>Fast Performance</h3>
    <p>Optimized for speed.</p>
  </div>

  <div class="feature">
    <h3><i class="fas fa-mobile-alt"></i>Mobile Ready</h3>
    <p>Works on every device.</p>
  </div>

  <div class="feature">
    <h3><i class="fas fa-sparkles"></i>Modern Design</h3>
    <p>Clean dark UI.</p>
  </div>
</section>

<section id="contact" class="contact">
  <h2><i class="fas fa-envelope"></i>Get in Touch</h2>
  <p>Email: <b>niemaahani@gmail.com</b></p>

  <form class="contact-form">
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2025 MyBrand | Designed with <i class="fas fa-heart"></i> <i class="fas fa-bolt"></i></p>
</footer>

<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const navLinks = document.querySelector('nav ul');

  menuToggle.addEventListener('click', () => {
    navLinks.classList.toggle('active');
  });
</script>

</body>
</html>
